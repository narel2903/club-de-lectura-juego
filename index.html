<!-- ===== Firebase: reemplaza el guardado de Claude por uno propio ===== -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAcSbSUczyO8NUpuGXDDnHwtIlytToXpWc",
    authDomain: "juegoclubdelectura.firebaseapp.com",
    projectId: "juegoclubdelectura",
    storageBucket: "juegoclubdelectura.firebasestorage.app",
    messagingSenderId: "998167753076",
    appId: "1:998167753076:web:7b69ef59eae112df503c21"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Identificador de dispositivo (sin login): separa progreso "personal" entre personas.
  function getDeviceId(){
    let id = localStorage.getItem("club-device-id");
    if(!id){
      id = "dev-" + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem("club-device-id", id);
    }
    return id;
  }
  function docId(key, shared){
    const safeKey = String(key).replace(/[\/\s]/g, "_");
    return shared ? `shared__${safeKey}` : `${getDeviceId()}__${safeKey}`;
  }

  // Mismo "contrato" que window.storage de Claude: get/set/delete/list.
  // El resto del juego no necesita cambiar ni una línea.
  window.storage = {
    async get(key, shared=false){
      try{
        const snap = await db.collection("gameData").doc(docId(key, shared)).get();
        if(!snap.exists) return null;
        return { key, value: snap.data().value, shared };
      }catch(e){ console.error("storage.get error:", e); return null; }
    },
    async set(key, value, shared=false){
      await db.collection("gameData").doc(docId(key, shared)).set({ key, value, shared });
      return { key, value, shared };
    },
    async delete(key, shared=false){
      await db.collection("gameData").doc(docId(key, shared)).delete();
      return { key, deleted:true, shared };
    },
    async list(prefix="", shared=false){
      const snapshot = await db.collection("gameData").get();
      const keys = [];
      snapshot.forEach(d=>{
        const data = d.data();
        if(data.shared === shared && String(data.key).startsWith(prefix)) keys.push(data.key);
      });
      return { keys, prefix, shared };
    }
  };
</script>
<style>
  :root{
    --bg:#141414;          /* fondo general de la página (negro) */
    --bg-deep:#000000;     /* negro más profundo hacia las esquinas */
    --card:#f7f5f0;        /* color de las tarjetas/fichas (blanco) */
    --card-line:#ddd3d3;   /* líneas de renglón sobre las tarjetas */
    --ink:#1a1a1a;         /* color del texto sobre las tarjetas blancas */
    --ink-soft:#5c5450;    /* texto secundario/gris sobre blanco */
    --brass:#7a1220;       /* ACENTO PRINCIPAL: bordó (bordes, barra de progreso) */
    --brass-light:#a52a3a; /* bordó más claro (detalles, hover) */
    --stamp:#7a1220;       /* color del sello "COMPLETADO" (bordó) */
    --stamp-dark:#4d0d16;  /* bordó oscuro (texto de error/feedback) */
    --cream-text:#f5f2ea;  /* texto sobre fondo negro */
    --green-mid:#1f1f1f;   /* fondo de las pestañas inactivas (negro/gris) */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top, #262626 0%, var(--bg) 55%, var(--bg-deep) 100%);
    color:var(--cream-text);
    font-family:'Spectral',serif;
    min-height:100vh;
    padding:20px 12px 60px;
  }
  .wrap{max-width:760px;margin:0 auto;}

  /* ---- Encabezado / tarjeta del libro ---- */
  .catalog-header{
    text-align:center;
    margin-bottom:22px;
  }
  .eyebrow{
    font-family:'Courier Prime',monospace;
    letter-spacing:3px;
    font-size:11px;
    color:var(--brass-light);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .book-card{
    background:var(--card);
    color:var(--ink);
    border-radius:2px;
    padding:22px 20px 18px;
    box-shadow:0 14px 30px -10px rgba(0,0,0,.55), 0 0 0 1px rgba(0,0,0,.05);
    position:relative;
    background-image:
      repeating-linear-gradient(to bottom, transparent 0px, transparent 27px, var(--card-line) 27px, var(--card-line) 28px);
    background-position:0 62px;
  }
  .book-card::before{
    content:'';
    position:absolute; left:14px; top:0; bottom:0; width:1px;
    background:rgba(122,18,32,.35);
  }
  .call-number{
    font-family:'Courier Prime',monospace;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:4px;
    padding-left:14px;
  }
  .book-title{
    font-family:'Special Elite',monospace;
    font-size:26px;
    line-height:1.25;
    margin:0 0 4px;
    padding-left:14px;
  }
  .book-author{
    font-size:15px; font-style:italic; color:var(--ink-soft);
    padding-left:14px; margin-bottom:2px;
  }

  /* ---- Fichero de pestañas ---- */
  .drawer{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding:18px 2px 8px;
    scrollbar-width:none;
  }
  .drawer::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;
    background:var(--green-mid);
    color:var(--cream-text);
    font-family:'Courier Prime',monospace;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.5px;
    padding:10px 12px 8px;
    border:none;
    border-top:3px solid var(--brass);
    cursor:pointer;
    opacity:.72;
    transition:all .18s ease;
    white-space:nowrap;
    border-radius:2px 2px 0 0;
  }
  .tab .ic{margin-right:6px;}
  .tab.active{
    background:var(--card);
    color:var(--ink);
    border-top:3px solid var(--stamp);
    opacity:1;
    transform:translateY(-3px);
    box-shadow:0 -4px 10px rgba(0,0,0,.25);
  }
  .tab .done-dot{
    display:inline-block; width:6px; height:6px; border-radius:50%;
    background:var(--stamp); margin-left:6px; vertical-align:middle;
  }

  /* ---- Panel principal (tarjeta) ---- */
  .panel{
    background:var(--card);
    color:var(--ink);
    border-radius:0 2px 2px 2px;
    padding:24px 20px 26px;
    min-height:320px;
    position:relative;
    box-shadow:0 20px 40px -14px rgba(0,0,0,.55);
    background-image:
      repeating-linear-gradient(to bottom, transparent 0px, transparent 27px, var(--card-line) 27px, var(--card-line) 28px);
  }
  .panel h2{
    font-family:'Special Elite',monospace;
    font-size:19px;
    margin:0 0 14px;
    display:flex; align-items:center; gap:8px;
  }
  .panel p{line-height:1.6; margin:0 0 14px; font-size:15.5px;}
  .stamp-mark{
    position:absolute; top:14px; right:16px;
    font-family:'Special Elite',monospace;
    color:var(--stamp);
    border:2.5px solid var(--stamp);
    padding:5px 10px;
    border-radius:4px;
    transform:rotate(-8deg);
    font-size:11.5px;
    letter-spacing:1px;
    opacity:0;
    transition:opacity .3s;
    text-transform:uppercase;
  }
  .stamp-mark.show{opacity:.88;}

  /* ---- Elementos comunes ---- */
  .btn{
    font-family:'Courier Prime',monospace;
    background:var(--ink);
    color:var(--card);
    border:none;
    padding:10px 16px;
    border-radius:3px;
    cursor:pointer;
    font-size:13px;
    letter-spacing:.5px;
    transition:transform .12s, background .12s;
  }
  .btn:hover{background:var(--stamp);}
  .btn:active{transform:scale(.97);}
  .btn.secondary{background:transparent;color:var(--ink);border:1.5px solid var(--ink-soft);}
  .btn.secondary:hover{background:rgba(0,0,0,.06);color:var(--ink);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  .opt{
    display:block; width:100%; text-align:left;
    background:#ffffff; border:1.5px solid var(--card-line);
    color:var(--ink); padding:10px 12px; margin-bottom:8px;
    border-radius:3px; cursor:pointer; font-family:'Spectral',serif; font-size:15px;
    transition:all .15s;
  }
  .opt:hover{border-color:var(--brass);}
  .opt.correct{background:#e3edd6;border-color:#5c8a4a;}
  .opt.wrong{background:#f3d9d3;border-color:var(--stamp);}
  .opt:disabled{cursor:default;}

  .feedback{font-family:'Courier Prime',monospace;font-size:13px;margin:6px 0 14px;}
  .feedback.ok{color:#3f6b32;}
  .feedback.bad{color:var(--stamp-dark);}

  .progress-track{
    background:#e3dcdc;height:10px;border-radius:6px;overflow:hidden;margin:6px 0 16px;
  }
  .progress-fill{
    background:linear-gradient(90deg,var(--brass),var(--brass-light));
    height:100%; border-radius:6px; transition:width .4s;
  }
  .etapas{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .etapa-chip{
    font-family:'Courier Prime',monospace; font-size:12px;
    border:1.5px solid var(--ink-soft); padding:7px 10px; border-radius:3px;
    cursor:pointer; background:transparent; color:var(--ink);
  }
  .etapa-chip.reached{background:var(--ink);color:var(--card);border-color:var(--ink);}

  textarea, input[type=text]{
    width:100%; font-family:'Spectral',serif; font-size:15px;
    padding:9px 10px; border:1.5px solid var(--card-line); border-radius:3px;
    background:#ffffff; color:var(--ink); resize:vertical;
  }
  .card-mini{
    background:#ffffff; border:1px solid var(--card-line); border-left:4px solid var(--stamp);
    padding:10px 12px; margin-bottom:10px; border-radius:2px; font-size:14.5px;
  }
  .card-mini .meta{font-family:'Courier Prime',monospace;font-size:11px;color:var(--ink-soft);margin-top:6px;display:flex;justify-content:space-between;}
  .like-btn{background:none;border:1px solid var(--ink-soft);border-radius:20px;padding:2px 9px;font-family:'Courier Prime',monospace;font-size:11px;cursor:pointer;color:var(--ink);}

  .badges{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .badge{
    text-align:center; padding:14px 8px; border-radius:4px; border:1.5px dashed var(--card-line);
    font-family:'Courier Prime',monospace; font-size:11.5px;
  }
  .badge.unlocked{border-style:solid;border-color:var(--brass);background:#f6e2e5;}
  .badge .emoji{font-size:26px;display:block;margin-bottom:4px;}
  .badge.locked{opacity:.4;}

  .locked-note{
    font-family:'Courier Prime',monospace; font-size:12.5px; color:var(--ink-soft);
    background:#e8e2e2; padding:10px 12px; border-radius:3px;
  }
  .score-line{font-family:'Courier Prime',monospace;font-size:13px;color:var(--ink-soft);margin-bottom:10px;}
  hr.rule{border:none;border-top:1px dashed var(--card-line);margin:16px 0;}
  small.hint{display:block;color:var(--ink-soft);font-size:12px;margin-top:-6px;margin-bottom:10px;font-family:'Courier Prime',monospace;}
  .final-rank{
    text-align:center;font-family:'Special Elite',monospace;font-size:22px;color:var(--stamp);
    border:3px double var(--stamp); padding:16px; border-radius:4px; margin-top:16px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="catalog-header">
    <div class="eyebrow">Club de lectura · Ficha del mes</div>
    <div class="book-card">
      <button id="adminGear" title="Cargar/editar libro del mes" style="position:absolute;top:10px;right:10px;background:none;border:none;font-size:18px;cursor:pointer;opacity:.55;">⚙️</button>

  <div class="drawer" id="drawer"></div>
  <div class="panel" id="panel">

    <div id="panelContent"></div>

</div>

<script>
/* ============================================================
   1. DATOS DEL LIBRO DEL MES — edita SOLO esta sección cada mes.
   El "id" cambia el fichero de progreso automáticamente:
   libros distintos no comparten avances.
   ============================================================ */
const DEFAULT_BOOK = {
  id: "viaje-al-centro-de-la-tierra",
  callNumber: "863.44 VER · Ficción · Julio 2026",
  titulo: "Viaje al Centro de la Tierra",
  autor: "Julio Verne",

  etapas: ["Inicio", "Mitad", "Final"], // partes del libro para desbloquear contenido

  trivia: [
    { etapa:0, pregunta:"¿Cómo descifra Axel el pergamino rúnico?", opciones:["Al calor de una vela","Con un diccionario antiguo","Leyéndolo al revés"], correcta:2 },
    { etapa:0, pregunta:"¿Cómo consigue Hans agua potable en el subsuelo?", opciones:["Derritiendo hielo","Recolectando vapor","Perforando la roca"], correcta:2 },
    { etapa:1, pregunta:"¿Qué criatura gigante ven en el bosque de hongos?", opciones:["Un dinosaurio","Un ser humano","Una serpiente alada"], correcta:1 },
    { etapa:2, pregunta:"¿Cuál es el nombre y donde se ubica el volcán por el que salen a la superficie?", opciones:["Stromboli (Italia)","Vesubio (Italia)","Teide (España)"], correcta:0 },
  ],

  escapeRoom: [
    { pista:"No soy un océano pero tengo olas. No estoy bajo el cielo sino bajo la tierra. ¿Qué accidente geográfico descubren los exploradores?", respuesta:"mar" },
    { pista:"Para continuar el viaje necesitábamos una fuente de luz. Completa la frase: Sin la ______, la oscuridad del mundo subterráneo habría detenido la expedición", respuesta:"lámpara de Ruhmkorff" },
    { pista:"Una brújula se vuelve completamente loca y marca el polo opuesto si hay una tormenta eléctrica o yacimientos de hierro cerca. (Indica si la afirmación es Verdadera o Falsa)", respuesta:"Verdadera" },
  ],

  detective: {
    intro:"Axel tomó el túnel equivocado y quedó aislado y sin agua. ¿Qué pista geológica lo confundió?",
    pistas:[
      "El camino correcto debía seguir la roca volcánica.",
      "Axel buscó un suelo que indicara vegetación antigua.",
      "El túnel elegido estaba seco y lleno de polvo negro.",
    ],
    sospechosos:["Las capas de carbón","Las rocas de granito","Las filtraciones de lava"],
    correcto:0
  },

  frases: [
    { cita:"Solo avanzando conoceremos la verdad.", opciones:["Axel","Lidenbrock","Saknussemm"], correcta:1 },
    { cita:"¿Y si nunca encontramos el camino de regreso?", opciones:["Hans","Lidenbrock","Axel"], correcta:2 },
  ],

  teoriaPrompt:"Si Axel hubiera tomado el liderazgo de la expedición en algún momento, ¿cómo creés que habría cambiado el desarrollo de la historia? Explicá tu teoría.",

  desafioFinal: [
    { pregunta:"En una frase, ¿cuál fue el mayor error del profesor Lidenbrock durante la expedición?", tipo:"abierta" },
    { pregunta:"¿Qué decisión fue la más importante para la supervivencia del grupo?", opciones:["Confiar en Hans durante los momentos críticos","Construir una balsa","Haber llevado las lámparas"], correcta:0, tipo:"opcion" },
    { pregunta:"¿Qué otros secretos creés que dejó ocultos Saknussemm?", tipo:"abierta" },
  ]
};

/* ============================================================
   2. MOTOR DEL JUEGO — no necesitas tocar nada de aquí abajo
   ============================================================ */
const SECTIONS = [
  {key:"progreso", label:"Progreso", icon:"📖"},
  {key:"trivia", label:"Trivia", icon:"❓"},
  {key:"escape", label:"Escape Room", icon:"🔐"},
  {key:"detective", label:"Detective", icon:"🕵️"},
  {key:"frases", label:"Frases", icon:"💬"},
  {key:"teorias", label:"Teorías", icon:"🧩"},
  {key:"logros", label:"Logros", icon:"🏅"},
  {key:"final", label:"Desafío Final", icon:"🏆"},
];

/* ---- Protección del panel admin con PIN ----
   ⚠️ CAMBIA ESTE PIN antes de compartir el juego con el club.
   No es una seguridad perfecta (es código visible en el navegador),
   pero evita que alguien entre por error o por curiosidad al tocar el ⚙️. */
const ADMIN_PIN = "0000";

async function isAdminUnlocked(){
  try{ const r = await window.storage.get("admin-unlocked"); return r && r.value === "true"; }
  catch(e){ return false; }
}
async function unlockAdmin(){
  try{ await window.storage.set("admin-unlocked", "true"); }catch(e){}
}
function openPin(){
  document.getElementById("pinInput").value = "";
  document.getElementById("pinError").textContent = "";
  document.getElementById("pinOverlay").style.display = "flex";
  document.getElementById("pinInput").focus();
}
function closePin(){ document.getElementById("pinOverlay").style.display = "none"; }

let BOOK = null;
const CONFIG_KEY = "config:libro-actual"; // clave compartida — un solo "libro activo" para todo el club

async function loadBookConfig(){
  try{
    const r = await window.storage.get(CONFIG_KEY, true);
    if(r && r.value){ BOOK = JSON.parse(r.value); return; }
  }catch(e){ /* aún no hay libro guardado */ }
  BOOK = DEFAULT_BOOK; // primera vez: usa la plantilla de ejemplo
  try{ await window.storage.set(CONFIG_KEY, JSON.stringify(BOOK), true); }catch(e){}
}
async function saveBookConfig(newBook){
  await window.storage.set(CONFIG_KEY, JSON.stringify(newBook), true);
  BOOK = newBook;
}

function openAdmin(){
  document.getElementById("adminJson").value = JSON.stringify(BOOK, null, 2);
  document.getElementById("adminError").textContent = "";
  document.getElementById("adminOverlay").style.display = "flex";
}
function closeAdmin(){ document.getElementById("adminOverlay").style.display = "none"; }

let state = {
  progreso: 0,
  trivia: { respondidas:{}, score:0 },
  escape: { paso:0, completado:false },
  detective: { acusacion:null, correcto:null },
  frases: { respondidas:{}, score:0 },
  final: { completado:false, score:0 }
};

const K = (name) => `${name}:${BOOK.id}`;

async function loadState(){
  for(const key of ["progreso","trivia","escape","detective","frases","final"]){
    try{
      const r = await window.storage.get(K(key));
      if(r && r.value) state[key] = JSON.parse(r.value);
    }catch(e){ /* no existe aún, se usa el default */ }
  }
}
async function saveState(key){
  try{ await window.storage.set(K(key), JSON.stringify(state[key])); }
  catch(e){ console.error("Error guardando", key, e); }
}

let activeTab = "progreso";

function isDone(key){
  if(key==="progreso") return state.progreso >= BOOK.etapas.length-1;
  if(key==="trivia") return Object.keys(state.trivia.respondidas).length >= BOOK.trivia.length;
  if(key==="escape") return state.escape.completado;
  if(key==="detective") return state.detective.acusacion!==null;
  if(key==="frases") return Object.keys(state.frases.respondidas).length >= BOOK.frases.length;
  if(key==="final") return state.final.completado;
  return false;
}

function renderHeader(){
  document.getElementById("callNumber").textContent = "Club de Lectura";
  document.getElementById("bookTitle").textContent = BOOK.titulo;
  document.getElementById("bookAuthor").textContent = "— " + BOOK.autor;
}

function renderDrawer(){
  const d = document.getElementById("drawer");
  d.innerHTML = "";
  SECTIONS.forEach(s=>{
    const b = document.createElement("button");
    b.className = "tab" + (activeTab===s.key ? " active":"");
    b.innerHTML = `<span class="ic">${s.icon}</span>${s.label}${isDone(s.key) ? '<span class="done-dot"></span>':''}`;
    b.onclick = ()=>{ activeTab = s.key; render(); };
    d.appendChild(b);
  });
}

function setStamp(show){
  document.getElementById("stampMark").className = "stamp-mark" + (show?" show":"");
}

function render(){
  renderDrawer();
  const c = document.getElementById("panelContent");
  setStamp(isDone(activeTab));
  c.innerHTML = "";
  const renderers = {progreso:renderProgreso, trivia:renderTrivia, escape:renderEscape, detective:renderDetective, frases:renderFrases, teorias:renderTeorias, logros:renderLogros, final:renderFinal};
  renderers[activeTab](c);
}

/* ---- Progreso ---- */
function renderProgreso(c){
  const pct = Math.round((state.progreso/(BOOK.etapas.length-1))*100);
  c.innerHTML = `
    <h2>📖 Progreso de lectura</h2>
    <p>Marca hasta dónde has leído. Esto desbloquea trivia y pistas nuevas.</p>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="score-line">${pct}% completado</div>
    <div class="etapas" id="etapaChips"></div>
  `;
  const chips = c.querySelector("#etapaChips");
  BOOK.etapas.forEach((e,i)=>{
    const b = document.createElement("button");
    b.className = "etapa-chip" + (i<=state.progreso ? " reached":"");
    b.textContent = e;
    b.onclick = ()=>{ state.progreso = i; saveState("progreso"); render(); };
    chips.appendChild(b);
  });
}

/* ---- Trivia ---- */
function renderTrivia(c){
  const disponibles = BOOK.trivia.filter(t=>t.etapa<=state.progreso);
  const pendientes = disponibles.map((t,i)=>BOOK.trivia.indexOf(t)).filter(i=>state.trivia.respondidas[i]===undefined);
  if(disponibles.length===0){
    c.innerHTML = `<h2>❓ Trivia</h2><div class="locked-note">Aún no hay preguntas disponibles para tu etapa de lectura. Avanza en "Progreso".</div>`;
    return;
  }
  c.innerHTML = `<h2>❓ Trivia</h2><div class="score-line">Puntaje: ${state.trivia.score} / ${BOOK.trivia.length}</div>`;
  if(pendientes.length===0){
    c.innerHTML += `<p>Has respondido todas las preguntas disponibles hasta ahora. ¡Vuelve cuando avances más en el libro!</p>`;
    return;
  }
  const idx = pendientes[0];
  const q = BOOK.trivia[idx];
  const box = document.createElement("div");
  box.innerHTML = `<p><strong>${q.pregunta}</strong></p>`;
  q.opciones.forEach((op,oi)=>{
    const b = document.createElement("button");
    b.className = "opt"; b.textContent = op;
    b.onclick = ()=>{
      const correcto = oi===q.correcta;
      state.trivia.respondidas[idx] = correcto;
      if(correcto) state.trivia.score++;
      saveState("trivia");
      render();
    };
    box.appendChild(b);
  });
  c.appendChild(box);
}

/* ---- Escape Room ---- */
function renderEscape(c){
  c.innerHTML = `<h2>🔐 Escape Room</h2>`;
  if(state.escape.completado){
    c.innerHTML += `<p>Resolviste el fichero secreto. ¡Escapaste! 🎉</p>`;
    return;
  }
  const paso = BOOK.escapeRoom[state.escape.paso];
  const box = document.createElement("div");
  box.innerHTML = `
    <p>Pista ${state.escape.paso+1} de ${BOOK.escapeRoom.length}:</p>
    <p><strong>${paso.pista}</strong></p>
    ${paso.pistaExtra ? `<small class="hint">${paso.pistaExtra}</small>`:""}
    <input type="text" id="escapeInput" placeholder="Tu respuesta...">
    <div style="margin-top:10px;"><button class="btn" id="escapeBtn">Resolver</button></div>
    <div class="feedback" id="escapeFeedback"></div>
  `;
  c.appendChild(box);
  c.querySelector("#escapeBtn").onclick = ()=>{
    const val = c.querySelector("#escapeInput").value.trim().toLowerCase();
    const fb = c.querySelector("#escapeFeedback");
    if(val === paso.respuesta.toLowerCase()){
      state.escape.paso++;
      if(state.escape.paso >= BOOK.escapeRoom.length){ state.escape.completado = true; }
      saveState("escape");
      render();
    } else {
      fb.textContent = "No es correcto. Vuelve a intentarlo.";
      fb.className = "feedback bad";
    }
  };
}

/* ---- Detective ---- */
function renderDetective(c){
  c.innerHTML = `<h2>🕵️ Detective</h2><p>${BOOK.detective.intro}</p>`;
  const ul = document.createElement("div");
  BOOK.detective.pistas.forEach(p=>{
    const d = document.createElement("div");
    d.className = "card-mini"; d.textContent = p;
    ul.appendChild(d);
  });
  c.appendChild(ul);

  if(state.detective.acusacion!==null){
    const acertado = state.detective.correcto;
    c.innerHTML += `<p class="feedback ${acertado?'ok':'bad'}">Acusaste a "${BOOK.detective.sospechosos[state.detective.acusacion]}". ${acertado?'¡Acertaste!':'No era esta vez.'}</p>`;
    return;
  }
  const box = document.createElement("div");
  box.innerHTML = `<hr class="rule"><p><strong>¿A quién acusas?</strong></p>`;
  BOOK.detective.sospechosos.forEach((s,i)=>{
    const b = document.createElement("button");
    b.className="opt"; b.textContent = s;
    b.onclick = ()=>{
      state.detective.acusacion = i;
      state.detective.correcto = i===BOOK.detective.correcto;
      saveState("detective");
      render();
    };
    box.appendChild(b);
  });
  c.appendChild(box);
}

/* ---- Frases ---- */
function renderFrases(c){
  const pendientes = BOOK.frases.map((_,i)=>i).filter(i=>state.frases.respondidas[i]===undefined);
  c.innerHTML = `<h2>💬 Frases</h2><div class="score-line">Puntaje: ${state.frases.score} / ${BOOK.frases.length}</div>`;
  if(pendientes.length>0){
    const idx = pendientes[0];
    const f = BOOK.frases[idx];
    const box = document.createElement("div");
    box.innerHTML = `<p>¿Quién dijo...?</p><p style="font-style:italic;">"${f.cita}"</p>`;
    f.opciones.forEach((op,oi)=>{
      const b = document.createElement("button");
      b.className="opt"; b.textContent=op;
      b.onclick=()=>{
        const correcto = oi===f.correcta;
        state.frases.respondidas[idx]=correcto;
        if(correcto) state.frases.score++;
        saveState("frases");
        render();
      };
      box.appendChild(b);
    });
    c.appendChild(box);
  } else {
    c.innerHTML += `<p>Completaste el quiz de frases.</p>`;
  }
  const wallHeader = document.createElement("div");
wallHeader.innerHTML = `<hr class="rule"><h2 style="font-size:16px;">🧷 Muro de frases favoritas</h2><p style="font-size:13px;color:var(--ink-soft)">Visible para todo el club.</p>`;
c.appendChild(wallHeader);
  const wallBox = document.createElement("div");
  wallBox.innerHTML = `
    <input type="text" id="wallName" placeholder="Tu nombre" style="margin-bottom:8px;">
    <textarea id="wallQuote" rows="2" placeholder="Tu frase favorita del libro..."></textarea>
    <div style="margin-top:8px;"><button class="btn" id="wallBtn">Publicar en el muro</button></div>
    <div id="wallList" style="margin-top:14px;"></div>
  `;
  c.appendChild(wallBox);
  loadWall();
  c.querySelector("#wallBtn").onclick = async ()=>{
    const nombre = c.querySelector("#wallName").value.trim() || "Anónimo";
    const frase = c.querySelector("#wallQuote").value.trim();
    if(!frase) return;
    let list = [];
    try{ const r = await window.storage.get(K("muro-frases"), true); if(r) list = JSON.parse(r.value); }catch(e){}
    list.push({nombre, frase});
    await window.storage.set(K("muro-frases"), JSON.stringify(list), true);
    c.querySelector("#wallQuote").value="";
    loadWall();
  };
  async function loadWall(){
    const listEl = c.querySelector("#wallList");
    let list = [];
    try{ const r = await window.storage.get(K("muro-frases"), true); if(r) list = JSON.parse(r.value); }catch(e){}
    listEl.innerHTML = list.slice().reverse().map(item=>`<div class="card-mini">"${item.frase}"<div class="meta"><span>— ${item.nombre}</span></div></div>`).join("") || `<div class="locked-note">Nadie ha publicado frases todavía. ¡Sé el primero!</div>`;
  }
}

/* ---- Teorías (compartido) ---- */
async function renderTeorias(c){
  c.innerHTML = `<h2>🧩 Teorías</h2><p>${BOOK.teoriaPrompt}</p>
    <input type="text" id="teoNombre" placeholder="Tu nombre" style="margin-bottom:8px;">
    <textarea id="teoTexto" rows="3" placeholder="Escribe tu teoría..."></textarea>
    <div style="margin-top:8px;"><button class="btn" id="teoBtn">Publicar teoría</button></div>
    <hr class="rule">
    <div id="teoList"></div>`;
  c.querySelector("#teoBtn").onclick = async ()=>{
    const nombre = c.querySelector("#teoNombre").value.trim() || "Anónimo";
    const texto = c.querySelector("#teoTexto").value.trim();
    if(!texto) return;
    let list = await getTeorias();
    list.push({id:Date.now(), nombre, texto, likes:0});
    await window.storage.set(K("teorias"), JSON.stringify(list), true);
    c.querySelector("#teoTexto").value="";
    loadTeorias();
  };
  async function getTeorias(){
    try{ const r = await window.storage.get(K("teorias"), true); return r? JSON.parse(r.value):[]; }catch(e){ return []; }
  }
  async function loadTeorias(){
    const list = await getTeorias();
    const el = c.querySelector("#teoList");
    el.innerHTML = list.slice().reverse().map(t=>`
      <div class="card-mini">${t.texto}
        <div class="meta"><span>— ${t.nombre}</span><button class="like-btn" data-id="${t.id}">👍 ${t.likes}</button></div>
      </div>`).join("") || `<div class="locked-note">Todavía no hay teorías. ¡Anímate a compartir la tuya!</div>`;
    el.querySelectorAll(".like-btn").forEach(btn=>{
      btn.onclick = async ()=>{
        let list2 = await getTeorias();
        const item = list2.find(t=>t.id==btn.dataset.id);
        if(item){ item.likes++; await window.storage.set(K("teorias"), JSON.stringify(list2), true); loadTeorias(); }
      };
    });
  }
  loadTeorias();
}

/* ---- Logros ---- */
function renderLogros(c){
  const badges = [
    {id:"lector", emoji:"📘", nombre:"Lector completo", ok: state.progreso>=BOOK.etapas.length-1},
    {id:"trivia", emoji:"🧠", nombre:"Trivia perfecta", ok: state.trivia.score===BOOK.trivia.length && Object.keys(state.trivia.respondidas).length===BOOK.trivia.length},
    {id:"escape", emoji:"🗝️", nombre:"Escapista", ok: state.escape.completado},
    {id:"detective", emoji:"🕵️", nombre:"Detective certero", ok: state.detective.correcto===true},
    {id:"frases", emoji:"💬", nombre:"Melómano de frases", ok: state.frases.score===BOOK.frases.length && Object.keys(state.frases.respondidas).length===BOOK.frases.length},
    {id:"final", emoji:"🏆", nombre:"Retador del mes", ok: state.final.completado},
  ];
  c.innerHTML = `<h2>🏅 Logros</h2><div class="badges" id="badgeGrid"></div>`;
  const grid = c.querySelector("#badgeGrid");
  badges.forEach(b=>{
    const d = document.createElement("div");
    d.className = "badge " + (b.ok?"unlocked":"locked");
    d.innerHTML = `<span class="emoji">${b.emoji}</span>${b.nombre}`;
    grid.appendChild(d);
  });
}

/* ---- Desafío Final ---- */
function renderFinal(c){
  const todoListo = isDone("trivia") && isDone("escape") && state.detective.acusacion!==null && isDone("frases");
  if(!todoListo){
    c.innerHTML = `<h2>🏆 Desafío Final</h2><div class="locked-note">Completa Trivia, Escape Room, Detective y Frases antes de intentar el desafío final.</div>`;
    return;
  }
  if(state.final.completado){
    c.innerHTML = `<h2>🏆 Desafío Final</h2><p>Ya completaste el desafío final de este libro.</p>
      <div class="final-rank">${state.final.titulo}</div>`;
    return;
  }
  c.innerHTML = `<h2>🏆 Desafío Final</h2><p>Responde todo para conocer tu título de lector del mes.</p><div id="finalForm"></div>
    <div style="margin-top:12px;"><button class="btn" id="finalSubmit">Entregar desafío</button></div>`;
  const form = c.querySelector("#finalForm");
  BOOK.desafioFinal.forEach((q,i)=>{
    const box = document.createElement("div");
    box.innerHTML = `<p><strong>${i+1}. ${q.pregunta}</strong></p>`;
    if(q.tipo==="abierta"){
      box.innerHTML += `<textarea rows="2" data-idx="${i}" class="final-input"></textarea>`;
    } else {
      q.opciones.forEach((op,oi)=>{
        box.innerHTML += `<label style="display:block;font-family:'Courier Prime',monospace;font-size:13px;margin-bottom:4px;"><input type="radio" name="final-${i}" value="${oi}"> ${op}</label>`;
      });
    }
    form.appendChild(box);
  });
  c.querySelector("#finalSubmit").onclick = ()=>{
    let score = 0, total = 0;
    BOOK.desafioFinal.forEach((q,i)=>{
      if(q.tipo==="opcion"){
        total++;
        const sel = form.querySelector(`input[name="final-${i}"]:checked`);
        if(sel && parseInt(sel.value)===q.correcta) score++;
      }
    });
    const pct = total? score/total : 1;
    let titulo = "Lector del mes";
    if(pct===1) titulo = "🏆 Maestro Lector del Mes";
    else if(pct>=0.5) titulo = "🕵️ Detective de Biblioteca";
    else titulo = "📖 Explorador de Historias";
    state.final = { completado:true, score, titulo };
    saveState("final");
    render();
  };
}

/* ---- Arranque ---- */
async function fullInit(){
  await loadBookConfig();
  renderHeader();
  activeTab = "progreso";
  state = { progreso:0, trivia:{respondidas:{},score:0}, escape:{paso:0,completado:false}, detective:{acusacion:null,correcto:null}, frases:{respondidas:{},score:0}, final:{completado:false,score:0} };
  await loadState();
  render();
}

document.getElementById("adminGear").onclick = async ()=>{
  if(await isAdminUnlocked()){ openAdmin(); } else { openPin(); }
};
document.getElementById("pinCancel").onclick = closePin;
document.getElementById("pinSubmit").onclick = async ()=>{
  const val = document.getElementById("pinInput").value;
  if(val === ADMIN_PIN){
    await unlockAdmin();
    closePin();
    openAdmin();
  } else {
    document.getElementById("pinError").textContent = "PIN incorrecto.";
  }
};
document.getElementById("adminCancel").onclick = closeAdmin;
document.getElementById("adminCopy").onclick = ()=>{
  document.getElementById("adminJson").value = JSON.stringify(BOOK, null, 2);
};
document.getElementById("adminSave").onclick = async ()=>{
  const errEl = document.getElementById("adminError");
  try{
    const parsed = JSON.parse(document.getElementById("adminJson").value);
    if(!parsed.id || !parsed.titulo){ throw new Error("El JSON necesita al menos 'id' y 'titulo'."); }
    await saveBookConfig(parsed);
    closeAdmin();
    await fullInit();
  }catch(e){
    errEl.textContent = "Error: " + e.message;
  }
};

fullInit();
</script>
